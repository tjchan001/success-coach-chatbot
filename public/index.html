<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:8000" />
  <title>Dallas College — Course Advisor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #app {
      width: 420px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    header {
      background: #003087;   /* Dallas College navy */
      color: #fff;
      padding: 16px 20px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header p {
      font-size: 0.78rem;
      opacity: 0.82;
      margin-top: 2px;
    }

    #chat-log {
      flex: 1;
      height: 400px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 84%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.bot {
      background: #eef2fb;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.user {
      background: #003087;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.error {
      background: #fdecea;
      color: #b71c1c;
      align-self: flex-start;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e5e9f0;
      background: #fafbfc;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #cdd3dc;
      border-radius: 24px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #user-input:focus { border-color: #003087; }

    #send-btn {
      padding: 10px 18px;
      background: #003087;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send-btn:hover   { background: #00419e; }
    #send-btn:disabled { background: #9ba8bb; cursor: default; }

    footer {
      font-size: 0.7rem;
      color: #9ba8bb;
      text-align: center;
      padding: 8px 16px 12px;
      background: #fafbfc;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Dallas College — Course Advisor</h1>
      <p>Ask about degrees, courses, and transfer requirements.</p>
    </header>

    <div id="chat-log" role="log" aria-live="polite" aria-label="Conversation history">
      <div class="msg bot">
        Hello! I'm your Dallas College Course Advisor.
        Ask me about degree plans, course requirements, or transfer information.
      </div>
    </div>

    <div id="input-row">
      <input
        id="user-input"
        type="text"
        placeholder="Type your question…"
        maxlength="2000"
        autocomplete="off"
        aria-label="Your message"
      />
      <button id="send-btn" type="button" aria-label="Send message">Send</button>
    </div>

    <footer>Powered by Dallas College Catalog · MVP v0.1.0</footer>
  </div>

  <script src="widget.js"></script>
</body>
</html>
